<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Wishes 💍</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="blastContainer"></div>
<div id="wave"></div>
<div class="hearts"></div>

<!-- FIRST PAGE -->
<div id="startScreen" class="start-screen">
    <div class="card" id="card">
        <h1>💍 Wedding Wishes 💖</h1>
        <p>A beautiful journey is about to begin... 💕  
         Two hearts becoming one, forever and always 💑
        </p>
        <button id="openBtn">✨ Click to open your surprise ✨💕</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainContent" class="hidden">

    <h1 class="title">💍 Happy Married Life💖</h1>
   
    <div class="container">
        <div class="left">
            <h2 id="names"></h2>
            <p id="message"></p>
        </div>

        <div class="right">
            <img id="slide">
        </div>
    </div>

</div>

<!-- FINAL -->
<div id="finalScreen">
    <h1>💖 Happy Married Life padhumaa🫂</h1>
    <img id="finalImg">
</div>

<audio id="bgMusic">
    <source src="music.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
